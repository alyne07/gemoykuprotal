<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Creative Minds | Gemoyku Project Developers</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #FFFFFF;
            --accent: #D59B37;      
            --text-main: #2B1C0B;   
            --text-muted: #6b5d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* LATAR BELAKANG FULL */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('latarbelakang.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.2;
            pointer-events: none;
        }

        /* Hero Section - Tulisan Rapi di Tengah */
        header {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: transparent; 
            text-align: center;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 700;
            line-height: 1.3;
            color: rgba(43, 28, 11, 0.9);
            max-width: 800px;
        }

        /* Dekorasi Ikon Anabul */
        .paw-decor {
            color: var(--accent);
            font-size: 28px;
            margin: 0 12px;
            display: inline-block;
            vertical-align: middle;
            opacity: 0.8;
        }

        /* Container & Cards */
        .team-container {
            max-width: 1100px;
            margin: -60px auto 100px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 30px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 15px 45px rgba(43, 28, 11, 0.08);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            border: 1px solid rgba(213, 155, 55, 0.15);
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(43, 28, 11, 0.15);
            background: rgba(255, 255, 255, 1);
        }

        .photo-frame {
            width: 150px;
            height: 200px;
            background-color: #f0f0f0;
            margin: 0 auto 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(213, 155, 55, 0.2);
            transition: transform 0.5s ease;
        }

        .card:hover .photo-frame {
            transform: scale(1.05);
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .nim {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--accent);
            margin: 0 auto 20px;
            border-radius: 2px;
        }

        .role {
            font-size: 14px;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.4;
        }

        .footer-line {
            text-align: center;
            padding-bottom: 60px;
            opacity: 0.7;
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 850px) {
            .team-container { grid-template-columns: 1fr; margin-top: 40px; }
            header { height: auto; padding: 60px 20px; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <p class="subtitle">Our Creative Team</p>
        <h1>
            The Minds Behind <br>
            <span>
                <i class="fas fa-dog paw-decor"></i>
                <span style="font-family: 'Playfair Display'; font-weight: 400; font-style: normal;">Gemoyku Project</span>
                <i class="fas fa-cat paw-decor"></i>
            </span>
        </h1>
    </header>

    <div class="team-container">
        <div class="card">
            <div class="photo-frame">
                <img src="alyne.jpg" alt="Alyne Angelina" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <span class="name">Alyne Angelina</span>
            <span class="nim">25.N1.0027</span>
            <div class="divider"></div>
            <p class="role">Lead Developer &<br>Systems Architect</p>
        </div>

        <div class="card">
            <div class="photo-frame">
                <img src="bigel.jpg" alt="Abigail Angeline" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <span class="name">Abigail Angeline</span>
            <span class="nim">25.N3.0001</span>
            <div class="divider"></div>
            <p class="role">UI Designer &<br>Brand Visionary</p>
        </div>

        <div class="card">
            <div class="photo-frame">
                <img src="baby.jpg" alt="Baby Maureen" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <span class="name">Baby Maureen</span>
            <span class="nim">25.N4.0008</span>
            <div class="divider"></div>
            <p class="role">Creative Director &<br>Experience Specialist</p>
        </div>
    </div>

    <div class="footer-line">
        EST. 2026 &mdash; GEMOYKU DEVELOPMENT TEAM
    </div>

</body>
</html>
